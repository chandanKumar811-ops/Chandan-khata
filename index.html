<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chandan Khata</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>💰 Chandan Khata</header>

<div class="container">

    <div class="card">
        <h3>Add Borrower</h3>

        <input id="name" placeholder="Borrower Name">

        <input id="amount" type="number" placeholder="Amount">

        <input id="rate" type="number" placeholder="Monthly Interest %">

        <label>Date Taken</label>
        <input type="date" id="date">

        <button onclick="saveBorrower()">Save Borrower</button>
    </div>

    <div class="card">

        <h3>Borrowers</h3>

        <input
            type="text"
            id="search"
            placeholder="Search borrower..."
            oninput="searchBorrowers()">

        <div id="list"></div>

        <h3>✅ Paid List</h3>

        <div id="paidList"></div>

        <div id="details" style="display:none;"></div>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
