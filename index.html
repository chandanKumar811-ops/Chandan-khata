<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chandan Khata</title>
<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f5f5f5;
}
header{
    background:#0d6efd;
    color:#fff;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}
.container{
    padding:15px;
}
.card{
    background:#fff;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}
input,button{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
}
button{
    background:#0d6efd;
    color:white;
    border:none;
}
</style>
</head>
<body>

<header>💰 Chandan Khata</header>

<div class="container">

<div class="card">
<h3>Add Borrower</h3>

<input id="name" placeholder="Borrower Name">

<input id="amount" type="number" placeholder="Amount">

<input id="rate" type="number" placeholder="Interest % per month">

<button onclick="alert('App setup successful!')">Save</button>

</div>

<div class="card">
<h3>Borrowers</h3>
<p>No borrowers yet.</p>
</div>

</div>

</body>
</html>
